<script>
(function(){
  function makeIcon(size) {
    var c = document.createElement('canvas');
    c.width = size; c.height = size;
    var ctx = c.getContext('2d');
    ctx.fillStyle = '#1a3a5c';
    var r = size * 0.22;
    ctx.beginPath();
    ctx.moveTo(r,0); ctx.lineTo(size-r,0);
    ctx.quadraticCurveTo(size,0,size,r);
    ctx.lineTo(size,size-r);
    ctx.quadraticCurveTo(size,size,size-r,size);
    ctx.lineTo(r,size);
    ctx.quadraticCurveTo(0,size,0,size-r);
    ctx.lineTo(0,r);
    ctx.quadraticCurveTo(0,0,r,0);
    ctx.closePath(); ctx.fill();
    var cx=size/2, cy=size*0.42, pr=size*0.22;
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(cx,cy,pr,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2563a8';
    ctx.beginPath(); ctx.arc(cx,cy,pr*0.55,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    ctx.moveTo(cx-pr*0.55,cy+pr*0.7);
    ctx.lineTo(cx+pr*0.55,cy+pr*0.7);
    ctx.lineTo(cx,cy+pr*1.6);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffffff';
    ctx.font='bold '+Math.round(size*0.13)+'px Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('MZA',cx,size*0.83);
    return c.toDataURL('image/png');
  }
  document.addEventListener('DOMContentLoaded',function(){
    var i192=makeIcon(192), i512=makeIcon(512);
    var al=document.createElement('link'); al.rel='apple-touch-icon'; al.href=i192; document.head.appendChild(al);
    var manifest={name:'MendozaMapa',short_name:'MendozaMapa',description:'Mapa de toda la provincia de Mendoza',start_url:'./',display:'standalone',orientation:'portrait',background_color:'#1a3a5c',theme_color:'#1a3a5c',icons:[{src:i192,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:i512,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
    var blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
    var ml=document.createElement('link'); ml.rel='manifest'; ml.href=URL.createObjectURL(blob); document.head.appendChild(ml);
  });
})();
</script>

// ========== MAPA ==========
function initMap() {
  map = L.map('map',{center:[-33.5,-68.5],zoom:8,zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  L.control.attribution({position:'bottomleft',prefix:'© OSM'}).addTo(map);
  map.on('click',function(e){ nuevoLat=e.latlng.lat; nuevoLng=e.latlng.lng; abrirFormGuardar(); });
  setTimeout(function(){map.invalidateSize();},200);
  setTimeout(function(){map.invalidateSize();},600);
  cargarMarkers();
  actualizarBadge();
  // Cargar barrios: primero del cache, luego buscar los que falten
  mostrarBarriosCacheados();
  setTimeout(function(){ buscarBarriosFaltantes(); }, 1000);
}

// ========== BARRIOS DESDE OSM ==========
function mostrarBarriosCacheados() {
  barriosCargados.forEach(function(b){ ponerBarrioEnMapa(b); });
}

function buscarBarriosFaltantes() {
  // Ver cuáles ya están en cache
  var yaEnCache = {};
  barriosCargados.forEach(function(b){ yaEnCache[b.n] = true; });
  var faltantes = BARRIOS_LISTA.filter(function(b){ return !yaEnCache[b.n]; });
  if (!faltantes.length) return;

  var banner = document.getElementById('barrioBanner');
  banner.style.display = 'block';
  banner.textContent = '🔍 Cargando barrios... 0/' + faltantes.length;

  var i = 0;
  function buscarSiguiente() {
    if (i >= faltantes.length) {
      banner.textContent = '✅ ' + barriosCargados.length + ' barrios cargados';
      setTimeout(function(){ banner.style.display='none'; }, 3000);
      localStorage.setItem('mm_barrios', JSON.stringify(barriosCargados));
      return;
    }
    var b = faltantes[i];
    banner.textContent = '🔍 Buscando barrios... ' + i + '/' + faltantes.length;
    var url = 'https://nominatim.openstreetmap.org/search?format=json&q=' +
      encodeURIComponent(b.n + ', Mendoza, Argentina') + '&limit=1&countrycodes=ar';
    fetch(url)
      .then(function(r){ return r.json(); })
      .then(function(data){
        if (data && data.length) {
          var item = {
            n: b.n,
            z: b.z,
            lat: parseFloat(data[0].lat),
            lng: parseFloat(data[0].lon)
          };
          barriosCargados.push(item);
          ponerBarrioEnMapa(item);
        }
        i++;
        setTimeout(buscarSiguiente, 300);
      })
      .catch(function(){
        i++;
        setTimeout(buscarSiguiente, 300);
      });
  }
  buscarSiguiente();
}

function ponerBarrioEnMapa(b) {
  var color = COL_ZONA[b.z] || '#64748b';
  var ico = L.divIcon({
    className:'',
    html:'<div style="background:'+color+';width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,0.4)"></div>',
    iconSize:[12,12], iconAnchor:[6,6]
  });
  var m = L.marker([b.lat,b.lng],{icon:ico}).addTo(map);
  m.bindPopup(
    '<div class="ppop"><b>🏘️ '+b.n+'</b><small style="color:#64748b">'+b.z+'</small>' +
    '<div class="ppop-btns"><button class="ppop-btn pnav" onclick="navegar('+b.lat+','+b.lng+')">🧭 Cómo llegar</button></div></div>'
  );
  barriosEnMapa.push({b:b, m:m});
}

// ========== UBICACION ==========
function miUbicacion() {
  toast('📍 Buscando ubicación...');
  navigator.geolocation.getCurrentPosition(
    function(p) {
      var lat=p.coords.latitude, lng=p.coords.longitude;
      map.setView([lat,lng],16);
      if(miMark) miMark.remove();
      var ico=L.divIcon({className:'',html:'<div style="width:18px;height:18px;background:#2563a8;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 5px rgba(37,99,168,0.25)"></div>',iconSize:[18,18],iconAnchor:[9,9]});
      miMark=L.marker([lat,lng],{icon:ico}).addTo(map);
      miMark.bindPopup('<b>📍 Estás aquí</b>').openPopup();
      nuevoLat=lat; nuevoLng=lng; toast('✅ Ubicación encontrada');
    },
    function(){ toast('❌ No se pudo obtener ubicación'); },
    {enableHighAccuracy:true,timeout:10000}
  );
}

function agregarAqui() {
  if(nuevoLat){ abrirFormGuardar(); return; }
  navigator.geolocation.getCurrentPosition(
    function(p){ nuevoLat=p.coords.latitude; nuevoLng=p.coords.longitude; abrirFormGuardar(); },
    function(){ toast('📌 Tocá el mapa para elegir un punto'); }
  );
}

// ========== GUARDAR LUGAR ==========
function abrirFormGuardar() {
  catSel='Otro';
  document.getElementById('pTitulo').textContent='➕ Guardar Lugar';
  document.getElementById('pBody').innerHTML=
    '<label class="flabel">NOMBRE DEL LUGAR</label>'+
    '<input class="finput" type="text" id="FN" placeholder="Ej: Casa de mamá, Carnicería, Barrio..." maxlength="60">'+
    '<label class="flabel">CATEGORÍA</label>'+
    '<div class="cats">'+
    cb('Casa','🏠')+cb('Trabajo','💼')+cb('Negocio','🏪')+
    cb('Barrio','🏘️')+cb('Finca','🌿')+cb('Favorito','⭐')+cb('Otro','📍')+
    '</div>'+
    '<button class="btnguardar" onclick="guardar()">✅ Guardar en el Mapa</button>';
  abrirPanel();
  setTimeout(function(){ var fn=document.getElementById('FN'); if(fn) fn.focus(); },400);
}

function cb(cat,emoji){ return '<div class="copt" id="c_'+cat+'" onclick="selCat(\''+cat+'\')"><span class="ce">'+emoji+'</span>'+cat+'</div>'; }
function selCat(cat){ catSel=cat; document.querySelectorAll('.copt').forEach(function(el){el.classList.remove('sel');}); var el=document.getElementById('c_'+cat); if(el)el.classList.add('sel'); }

function guardar() {
  var fn=document.getElementById('FN'), nombre=fn?fn.value.trim():'';
  if(!nombre){ toast('⚠️ Escribí un nombre'); return; }
  if(!nuevoLat){ toast('⚠️ Tocá el mapa primero'); return; }
  var l={id:Date.now(),nombre:nombre,cat:catSel,lat:nuevoLat,lng:nuevoLng,fecha:new Date().toLocaleDateString('es-AR')};
  lugares.unshift(l); save(); addMarker(l); cerrar(); toast('✅ '+nombre+' guardado!'); actualizarBadge();
}

function addMarker(l) {
  var color=COLS[l.cat]||'#64748b';
  var ico=L.divIcon({className:'',html:'<div style="width:16px;height:16px;background:'+color+';border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.35)"></div>',iconSize:[16,16],iconAnchor:[8,8]});
  var m=L.marker([l.lat,l.lng],{icon:ico}).addTo(map);
  m.bindPopup('<div class="ppop"><b>'+l.nombre+'</b><small>'+l.cat+' · '+l.fecha+'</small><div class="ppop-btns"><button class="ppop-btn pnav" onclick="navegar('+l.lat+','+l.lng+')">🧭 Cómo llegar</button><button class="ppop-btn pdel" onclick="eliminar('+l.id+')">🗑️</button></div></div>');
  marks[l.id]=m;
}

function cargarMarkers(){ lugares.forEach(function(l){addMarker(l);}); }
function navegar(lat,lng){ window.open('https://www.google.com/maps/dir/?api=1&destination='+lat+','+lng+'&travelmode=driving','_blank'); }

function eliminar(id) {
  if(!confirm('¿Eliminar este lugar?'))return;
  lugares=lugares.filter(function(l){return l.id!==id;}); save();
  if(marks[id]){marks[id].remove();delete marks[id];} map.closePopup(); actualizarBadge(); toast('🗑️ Lugar eliminado');
}

// ========== BUSQUEDA ==========
function onInput(val) {
  if(!val||val.length<2){ hideRes(); return; }
  var q=val.toLowerCase();
  // Buscar en mis lugares
  var resL=lugares.filter(function(l){return l.nombre.toLowerCase().indexOf(q)>=0;});
  // Buscar en barrios cacheados
  var resB=barriosCargados.filter(function(b){return b.n.toLowerCase().indexOf(q)>=0;});
  var el=document.getElementById('resultados');
  var html='';
  if(resB.length){
    html+=resB.slice(0,5).map(function(b){
      var color=COL_ZONA[b.z]||'#64748b';
      var idx=barriosCargados.indexOf(b);
      return '<div class="ritem" onclick="irABarrio('+idx+')">'+
        '<span style="color:'+color+';font-size:18px">🏘️</span>'+
        '<div><div class="rn">'+b.n+'</div><div class="rs">'+b.z+'</div></div></div>';
    }).join('');
  }
  if(resL.length){
    html+=resL.slice(0,5).map(function(l){
      var color=COLS[l.cat]||'#64748b';
      return '<div class="ritem" onclick="irA('+l.id+')">'+
        '<span style="color:'+color+';font-size:18px">📍</span>'+
        '<div><div class="rn">'+l.nombre+'</div><div class="rs">'+l.cat+'</div></div></div>';
    }).join('');
  }
  if(!html){ html='<div class="ritem" style="color:#64748b;font-size:13px;cursor:default">Sin resultados. Presioná Buscar para buscar en el mapa.</div>'; }
  el.innerHTML=html; el.style.display='block';
}

function buscarDir() {
  var q=(document.getElementById('SI').value||'').trim(); if(!q) return;
  // Buscar en barrios primero
  var ql=q.toLowerCase();
  var barrio=null;
  for(var i=0;i<barriosCargados.length;i++){
    if(barriosCargados[i].n.toLowerCase().indexOf(ql)>=0){ barrio=barriosCargados[i]; break; }
  }
  if(barrio){ irABarrio(barriosCargados.indexOf(barrio)); document.getElementById('SI').value=''; return; }
  // Buscar en mis lugares
  var local=null;
  for(var j=0;j<lugares.length;j++){
    if(lugares[j].nombre.toLowerCase().indexOf(ql)>=0){ local=lugares[j]; break; }
  }
  if(local){ irA(local.id); document.getElementById('SI').value=''; hideRes(); return; }
  // Buscar en OSM
  var el=document.getElementById('resultados');
  el.innerHTML='<div class="ritem" style="color:#64748b;font-size:13px;cursor:default">🔍 Buscando en Mendoza...</div>';
  el.style.display='block';
  fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q+', Mendoza, Argentina')+'&limit=5&countrycodes=ar')
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data.length){ el.innerHTML='<div class="ritem" style="color:#64748b;font-size:13px;cursor:default">Sin resultados.</div>'; return; }
      el.innerHTML=data.map(function(item){
        var parts=item.display_name.split(',');
        return '<div class="ritem" onclick="irACoord('+item.lat+','+item.lon+',\''+parts[0].replace(/'/g,"\\'")+'\')">'+
          '<span style="font-size:18px">🔍</span>'+
          '<div><div class="rn">'+parts[0]+'</div><div class="rs">'+(parts[1]||'')+'</div></div></div>';
      }).join('');
    })
    .catch(function(){ el.innerHTML='<div class="ritem" style="color:#64748b;font-size:13px;cursor:default">Sin conexión. Solo lugares guardados.</div>'; });
}

function irABarrio(idx) {
  var b=barriosCargados[idx]; if(!b) return;
  map.setView([b.lat,b.lng],15);
  if(barriosEnMapa[idx]) barriosEnMapa[idx].m.openPopup();
  hideRes(); cerrar(); document.getElementById('SI').value='';
}

function irA(id) {
  var l=null; for(var i=0;i<lugares.length;i++){if(lugares[i].id===id){l=lugares[i];break;}} if(!l) return;
  map.setView([l.lat,l.lng],17); if(marks[id]) marks[id].openPopup();
  hideRes(); cerrar(); document.getElementById('SI').value='';
}

function irACoord(lat,lng,nombre) {
  map.setView([parseFloat(lat),parseFloat(lng)],17);
  L.popup().setLatLng([parseFloat(lat),parseFloat(lng)])
    .setContent('<div class="ppop"><b>📍 '+nombre+'</b><div class="ppop-btns"><button class="ppop-btn pnav" onclick="navegar('+lat+','+lng+')">🧭 Cómo llegar</button></div></div>')
    .openOn(map);
  hideRes(); document.getElementById('SI').value='';
}

function hideRes(){ document.getElementById('resultados').style.display='none'; }

// ========== LISTA BARRIOS ==========
function renderBarrios() {
  document.getElementById('pTitulo').textContent='🏘️ Barrios (' + barriosCargados.length + ')';
  var zonas = {};
  barriosCargados.forEach(function(b){
    if(!zonas[b.z]) zonas[b.z]=[];
    zonas[b.z].push(b);
  });
  var html='';
  var zonasKeys = Object.keys(zonas);
  if(!zonasKeys.length){
    html='<div class="empty"><div class="ei">📶</div><p>Los barrios se cargan automáticamente con internet.<br>Abrí la app con conexión una vez.</p></div>';
  } else {
    zonasKeys.forEach(function(z){
      var color=COL_ZONA[z]||'#64748b';
      html+='<div style="margin-bottom:6px;padding:6px 0;border-bottom:1px solid var(--borde)">'+
        '<div style="font-weight:700;font-size:13px;color:'+color+';margin-bottom:6px">● '+z+' ('+zonas[z].length+')</div>';
      zonas[z].forEach(function(b){
        var idx=barriosCargados.indexOf(b);
        html+='<div class="litem" onclick="irABarrio('+idx+')">'+
          '<div class="ldot" style="background:'+color+'"></div>'+
          '<div class="linfo"><div class="ln">'+b.n+'</div></div>'+
          '<button class="lbtn lnav" onclick="event.stopPropagation();navegar('+b.lat+','+b.lng+')">🧭</button>'+
          '</div>';
      });
      html+='</div>';
    });
  }
  document.getElementById('pBody').innerHTML=html;
}

// ========== LISTA LUGARES ==========
function renderLista() {
  var filtrados=filtro==='todos'?lugares:lugares.filter(function(l){return l.cat===filtro;});
  var favs=filtrados.filter(function(l){return l.cat==='Favorito';});
  filtrados=favs.concat(filtrados.filter(function(l){return l.cat!=='Favorito';}));
  var chips=['todos|Todos','Casa|🏠 Casa','Trabajo|💼 Trabajo','Negocio|🏪 Negocio','Barrio|🏘️ Barrio','Finca|🌿 Finca','Favorito|⭐ Favorito','Otro|📍 Otro'];
  var chipsH='<div class="chips">'+chips.map(function(c){
    var p=c.split('|'); var on=filtro===p[0]?' on':'';
    return '<span class="chip'+on+'" onclick="setFiltro(\''+p[0]+'\')">'+p[1]+'</span>';
  }).join('')+'</div>';
  var listaH='';
  if(!filtrados.length){
    listaH='<div class="empty"><div class="ei">📭</div><p>No hay lugares guardados.<br>Tocá el mapa o ➕ para agregar.</p></div>';
  } else {
    filtrados.forEach(function(l){
      var color=COLS[l.cat]||'#64748b';
      listaH+='<div class="litem" onclick="irA('+l.id+')">'+
        '<div class="ldot" style="background:'+color+'"></div>'+
        '<div class="linfo"><div class="ln">'+l.nombre+'</div><div class="lc">'+l.cat+' · '+l.fecha+'</div></div>'+
        '<button class="lbtn lnav" onclick="event.stopPropagation();navegar('+l.lat+','+l.lng+')">🧭</button>'+
        '<button class="lbtn ldel" onclick="event.stopPropagation();eliminar('+l.id+')">🗑️</button>'+
        '</div>';
    });
  }
  document.getElementById('pTitulo').innerHTML='📌 Mis Lugares <span class="badge">'+lugares.length+'</span>';
  document.getElementById('pBody').innerHTML=chipsH+listaH;
}

function setFiltro(cat){ filtro=cat; renderLista(); }

// ========== TABS ==========
function showTab(tab) {
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  var el=document.getElementById('t-'+tab); if(el) el.classList.add('on');
  if(tab==='lugares'){ renderLista(); abrirPanel(); }
  else if(tab==='barrios'){ renderBarrios(); abrirPanel(); }
  else if(tab==='mapa'){ cerrar(); }
}

function abrirPanel(){ document.getElementById('panel').classList.add('open'); document.getElementById('overlay').style.display='block'; }
function cerrar(){
  document.getElementById('panel').classList.remove('open');
  document.getElementById('overlay').style.display='none';
  hideRes();
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  document.getElementById('t-mapa').classList.add('on');
}

// ========== EXPORT / IMPORT ==========
function exportar() {
  if(!lugares.length){ toast('⚠️ No hay lugares para exportar'); return; }
  var blob=new Blob([JSON.stringify({version:2,lugares:lugares},null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url; a.download='MendozaMapa_backup.json'; a.click();
  URL.revokeObjectURL(url); toast('💾 Backup exportado!');
}

function importar() {
  var inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=function(e){
    var file=e.target.files[0]; if(!file) return;
    var r=new FileReader();
    r.onload=function(ev){
      try{
        var data=JSON.parse(ev.target.result), imp=data.lugares||data;
        if(!Array.isArray(imp)) throw new Error();
        var ex={}; lugares.forEach(function(l){ex[l.id]=true;});
        var nuevos=0; imp.forEach(function(l){if(!ex[l.id]){lugares.push(l);nuevos++;}});
        save();
        Object.values(marks).forEach(function(m){m.remove();}); marks={};
        cargarMarkers(); actualizarBadge();
        toast('✅ '+nuevos+' lugares importados!');
      } catch(err){ toast('❌ Archivo inválido'); }
    }; r.readAsText(file);
  }; inp.click();
}

function save(){ localStorage.setItem('mm_v2',JSON.stringify(lugares)); }
function actualizarBadge(){ var b=document.getElementById('badge'); if(b) b.textContent=lugares.length; }
function toast(msg){ var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(function(){el.classList.remove('show');},2500); }

// ========== ARRANQUE ==========
window.onload = function() { initMap(); };

document.addEventListener('click',function(e){
  var res=document.getElementById('resultados'), sb=document.getElementById('searchbar');
  if(res&&sb&&!res.contains(e.target)&&!sb.contains(e.target)) hideRes();
});
</script>
