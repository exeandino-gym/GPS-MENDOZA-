<script>
(function(){
  function makeIcon(size) {
    var c = document.createElement('canvas');
    c.width = size; c.height = size;
    var ctx = c.getContext('2d');
    ctx.fillStyle = '#1a3a5c';
    var r = size * 0.22;
    ctx.beginPath();
    ctx.moveTo(r,0); ctx.lineTo(size-r,0);
    ctx.quadraticCurveTo(size,0,size,r);
    ctx.lineTo(size,size-r);
    ctx.quadraticCurveTo(size,size,size-r,size);
    ctx.lineTo(r,size);
    ctx.quadraticCurveTo(0,size,0,size-r);
    ctx.lineTo(0,r);
    ctx.quadraticCurveTo(0,0,r,0);
    ctx.closePath(); ctx.fill();
    var cx=size/2, cy=size*0.42, pr=size*0.22;
    ctx.fillStyle='#ffffff';
    ctx.beginPath(); ctx.arc(cx,cy,pr,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#2563a8';
    ctx.beginPath(); ctx.arc(cx,cy,pr*0.55,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffffff';
    ctx.beginPath();
    ctx.moveTo(cx-pr*0.55,cy+pr*0.7);
    ctx.lineTo(cx+pr*0.55,cy+pr*0.7);
    ctx.lineTo(cx,cy+pr*1.6);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ffffff';
    ctx.font='bold '+Math.round(size*0.13)+'px Arial';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('MZA',cx,size*0.83);
    return c.toDataURL('image/png');
  }
  document.addEventListener('DOMContentLoaded',function(){
    var i192=makeIcon(192), i512=makeIcon(512);
    var al=document.createElement('link'); al.rel='apple-touch-icon'; al.href=i192; document.head.appendChild(al);
    var manifest={name:'MendozaMapa',short_name:'MendozaMapa',description:'Mapa de toda la provincia de Mendoza',start_url:'./',display:'standalone',orientation:'portrait',background_color:'#1a3a5c',theme_color:'#1a3a5c',icons:[{src:i192,sizes:'192x192',type:'image/png',purpose:'any maskable'},{src:i512,sizes:'512x512',type:'image/png',purpose:'any maskable'}]};
    var blob=new Blob([JSON.stringify(manifest)],{type:'application/json'});
    var ml=document.createElement('link'); ml.rel='manifest'; ml.href=URL.createObjectURL(blob); document.head.appendChild(ml);
  });
})();
</script>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; background: #f1f5f9; color: #0f172a; }

#tabs { background:var(--card); border-top:1px solid var(--borde); display:flex; flex-shrink:0; }
.tab { flex:1; background:none; border:none; padding:10px 4px 12px; font-size:10px; color:var(--gris); cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:3px; }
.tab .ti { font-size:22px; }
.tab.on { color:#2563a8; font-weight:700; }

<!-- APP PRINCIPAL -->
<div id="app">
  
  <div id="header">
    <span style="font-size:24px">🗺️</span>
    <div class="titulo">
      <h1>MendozaMapa</h1>
      <p id="headerSub">Provincia de Mendoza</p>
    </div>
    <button class="hbtn" onclick="toggleDark()">🌙</button>
    <button class="hbtn" onclick="exportar()">💾</button>
  </div>
  <div id="searchbar">
    <input type="text" id="SI" placeholder="Buscar lugar o dirección..." autocomplete="off"
      oninput="onInput(this.value)"
      onkeydown="if(event.key==='Enter') buscarDir()">
    <button id="btnBuscar" onclick="buscarDir()">Buscar</button>
  </div>
  <div id="map"></div>
  <div id="tabs">
    <button class="tab on" id="t-mapa" onclick="showTab('mapa')"><span class="ti">🗺️</span>Mapa</button>
    <button class="tab" id="t-lugares" onclick="showTab('lugares')"><span class="ti">📌</span>Lugares<span class="badge" id="badge">0</span></button>
    <button class="tab" id="t-import" onclick="importar()"><span class="ti">📂</span>Importar</button>
    <button class="tab" id="t-info" onclick="showInfo()"><span class="ti">ℹ️</span>Info</button>
  </div>
</div>

<div id="fabs">
  <button class="fab fab-loc" onclick="miUbicacion()">📍</button>
  <button class="fab fab-add" onclick="agregarAqui()">➕</button>
</div>

<div id="resultados"></div>
<div id="overlay" onclick="cerrar()"></div>
<div id="panel">
  <div class="phandle"></div>
  <div class="pheader"><span class="ptitle" id="pTitulo">Panel</span><button class="pclose" onclick="cerrar()">✕</button></div>
  <div class="pbody" id="pBody"></div>
</div>

var lugares = JSON.parse(localStorage.getItem('mm_v2') || '[]');

var catSel = 'Otro';
var filtro = 'todos';

var miMark = null;
var marks = {};
var COLS = {Casa:'#2563a8',Trabajo:'#7c3aed',Negocio:'#ea580c',Amigo:'#16a34a',Favorito:'#ca8a04',Otro:'#64748b'};

if (dark) document.body.classList.add('dark');
function toggleDark() { dark=!dark; document.body.classList.toggle('dark',dark); localStorage.setItem('mm_dark',dark?'1':'0'); }

function initMap() {
  map = L.map('map',{center:[-34.6,-68.5],zoom:7,zoomControl:false,attributionControl:false});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map);
  L.control.attribution({position:'bottomleft',prefix:'© OSM'}).addTo(map);
  map.on('click',function(e){ nuevoLat=e.latlng.lat; nuevoLng=e.latlng.lng; abrirFormGuardar(); });
  setTimeout(function(){map.invalidateSize();},200);
  setTimeout(function(){map.invalidateSize();},600);
  cargarMarkers();
  cargarBarrios();
  actualizarBadge();
}

function miUbicacion() {
  toast('📍 Buscando ubicación...');
  navigator.geolocation.getCurrentPosition(
    function(p) {
      var lat=p.coords.latitude, lng=p.coords.longitude;
      map.setView([lat,lng],16);
      if(miMark) miMark.remove();
      var ico=L.divIcon({className:'',html:'<div style="width:18px;height:18px;background:#2563a8;border:3px solid #fff;border-radius:50%;box-shadow:0 0 0 5px rgba(37,99,168,0.25)"></div>',iconSize:[18,18],iconAnchor:[9,9]});
      miMark=L.marker([lat,lng],{icon:ico}).addTo(map);
      miMark.bindPopup('<b>📍 Estás aquí</b>').openPopup();
      nuevoLat=lat; nuevoLng=lng; toast('✅ Ubicación encontrada');
    },
    function(){toast('❌ No se pudo obtener ubicación');},
    {enableHighAccuracy:true,timeout:10000}
  );
}

function agregarAqui() {
  if(nuevoLat){abrirFormGuardar();return;}
  navigator.geolocation.getCurrentPosition(
    function(p){nuevoLat=p.coords.latitude;nuevoLng=p.coords.longitude;abrirFormGuardar();},
    function(){toast('📌 Tocá el mapa para elegir un punto');}
  );
}

function abrirFormGuardar() {
  catSel='Otro';
  document.getElementById('pTitulo').textContent='➕ Guardar Lugar';
  document.getElementById('pBody').innerHTML=
    '<label class="flabel">NOMBRE DEL LUGAR</label>'+
    '<input class="finput" type="text" id="FN" placeholder="Ej: Casa de mamá, Carnicería..." maxlength="60">'+
    '<label class="flabel">CATEGORÍA</label>'+
    '<div class="cats">'+cb('Casa','🏠')+cb('Trabajo','💼')+cb('Negocio','🏪')+cb('Amigo','👤')+cb('Favorito','⭐')+cb('Otro','📍')+'</div>'+
    '<button class="btnguardar" onclick="guardar()">✅ Guardar en el Mapa</button>';
  abrirPanel();
  setTimeout(function(){var fn=document.getElementById('FN');if(fn)fn.focus();},400);
}

function cb(cat,emoji){ return '<div class="copt" id="c_'+cat+'" onclick="selCat(\''+cat+'\')"><span class="ce">'+emoji+'</span>'+cat+'</div>'; }
function selCat(cat){ catSel=cat; document.querySelectorAll('.copt').forEach(function(el){el.classList.remove('sel');}); var el=document.getElementById('c_'+cat); if(el)el.classList.add('sel'); }

function guardar() {
  var fn=document.getElementById('FN'), nombre=fn?fn.value.trim():'';
  if(!nombre){toast('⚠️ Escribí un nombre');return;}
  if(!nuevoLat){toast('⚠️ Tocá el mapa primero');return;}
  var l={id:Date.now(),nombre:nombre,cat:catSel,lat:nuevoLat,lng:nuevoLng,fecha:new Date().toLocaleDateString('es-AR')};
  lugares.unshift(l); save(); addMarker(l); cerrar(); toast('✅ '+nombre+' guardado!'); actualizarBadge();
}

function addMarker(l) {
  var color=COLS[l.cat]||'#64748b';
  var ico=L.divIcon({className:'',html:'<div style="width:16px;height:16px;background:'+color+';border:3px solid #fff;border-radius:50%;box-shadow:0 2px 8px rgba(0,0,0,0.35)"></div>',iconSize:[16,16],iconAnchor:[8,8]});
  var m=L.marker([l.lat,l.lng],{icon:ico}).addTo(map);
  m.bindPopup('<div class="ppop"><b>'+l.nombre+'</b><small>'+l.cat+' · '+l.fecha+'</small><div class="ppop-btns"><button class="ppop-btn pnav" onclick="navegar('+l.lat+','+l.lng+')">🧭 Cómo llegar</button><button class="ppop-btn pdel" onclick="eliminar('+l.id+')">🗑️</button></div></div>');
  marks[l.id]=m;
}

function cargarMarkers(){ lugares.forEach(function(l){addMarker(l);}); }

var barrioMarkers = [];

function cargarBarrios() {
  var colZona = {
    'Rivadavia':'#7c3aed',
    'Rivadavia Sur':'#9333ea',
    'San Martín':'#ea580c',
    'Palmira':'#0891b2',
    'Junín':'#16a34a'
  };
  BARRIOS.forEach(function(b) {
    var color = colZona[b.zona] || '#64748b';
    var ico = L.divIcon({
      className:'',
      html:'<div style="background:'+color+';width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.4)"></div>',
      iconSize:[12,12], iconAnchor:[6,6]
    });
    var m = L.marker([b.lat,b.lng],{icon:ico}).addTo(map);
    m.bindPopup(
      '<div class="ppop"><b>🏘️ '+b.nombre+'</b><small>'+b.zona+'</small>' +
      '<div class="ppop-btns"><button class="ppop-btn pnav" onclick="navegar('+b.lat+','+b.lng+')">🧭 Cómo llegar</button></div></div>'
    );
    barrioMarkers.push({b:b, m:m});
  });
}

function buscarBarrio(q) {
  var ql = q.toLowerCase();
  return BARRIOS.filter(function(b){
    return b.nombre.toLowerCase().indexOf(ql) >= 0 || b.zona.toLowerCase().indexOf(ql) >= 0;
  });
}

function irABarrio(idx) {
  var b = BARRIOS[idx];
  if (!b) return;
  map.setView([b.lat, b.lng], 16);
  barrioMarkers[idx].m.openPopup();
  hideRes();
  document.getElementById('SI').value = '';
}

function eliminar(id) {
  if(!confirm('¿Eliminar este lugar?'))return;
  lugares=lugares.filter(function(l){return l.id!==id;}); save();
  if(marks[id]){marks[id].remove();delete marks[id];} map.closePopup(); actualizarBadge(); toast('🗑️ Lugar eliminado');
}

function onInput(val) {
  if(!val||val.length<2){hideRes();return;}
  var q=val.toLowerCase();
  var resL=lugares.filter(function(l){return l.nombre.toLowerCase().indexOf(q)>=0;});
  var resB=buscarBarrio(val);
  var el=document.getElementById('resultados');
  var html='';
  if(resB.length){
    html+=resB.slice(0,5).map(function(b){
      var colZona={'Rivadavia':'#7c3aed','Rivadavia Sur':'#9333ea','San Martín':'#ea580c','Palmira':'#0891b2','Junín':'#16a34a'};
      var color=colZona[b.zona]||'#64748b';
      var idx=BARRIOS.indexOf(b);
      return '<div class="ritem" onclick="irABarrio('+idx+')"><span style="color:'+color+';font-size:18px">🏘️</span><div><div class="rn">'+b.nombre+'</div><div class="rs">'+b.zona+'</div></div></div>';
    }).join('');
  }
  if(resL.length){
    html+=resL.slice(0,5).map(function(l){var color=COLS[l.cat]||'#64748b';return '<div class="ritem" onclick="irA('+l.id+')"><span style="color:'+color+';font-size:18px">📍</span><div><div class="rn">'+l.nombre+'</div><div class="rs">'+l.cat+'</div></div></div>';}).join('');
  }
  if(!html){html='<div class="ritem" style="color:#64748b;font-size:13px;cursor:default">Sin resultados. Presioná Buscar para buscar en el mapa.</div>';}
  el.innerHTML=html; el.style.display='block';
}

function buscarDir() {
  var q=(document.getElementById('SI').value||'').trim(); if(!q)return;
  var ql=q.toLowerCase(), local=null;
  for(var i=0;i<lugares.length;i++){if(lugares[i].nombre.toLowerCase().indexOf(ql)>=0){local=lugares[i];break;}}
  if(local){irA(local.id);document.getElementById('SI').value='';hideRes();return;}
  var el=document.getElementById('resultados');
  el.innerHTML='<div class="ritem" style="color:#64748b;font-size:13px;cursor:default">🔍 Buscando en Mendoza...</div>'; el.style.display='block';
  fetch('https://nominatim.openstreetmap.org/search?format=json&q='+encodeURIComponent(q+', Mendoza, Argentina')+'&limit=5&countrycodes=ar')
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data.length){el.innerHTML='<div class="ritem" style="color:#64748b;font-size:13px;cursor:default">Sin resultados.</div>';return;}
      el.innerHTML=data.map(function(item){var parts=item.display_name.split(',');return '<div class="ritem" onclick="irACoord('+item.lat+','+item.lon+',\''+parts[0].replace(/'/g,"\\'")+'\')"><span style="font-size:18px">🔍</span><div><div class="rn">'+parts[0]+'</div><div class="rs">'+(parts[1]||'')+'</div></div></div>';}).join('');
    })
    .catch(function(){el.innerHTML='<div class="ritem" style="color:#64748b;font-size:13px;cursor:default">Sin conexión. Solo lugares guardados.</div>';});
}

function irA(id) {
  var l=null; for(var i=0;i<lugares.length;i++){if(lugares[i].id===id){l=lugares[i];break;}} if(!l)return;
  map.setView([l.lat,l.lng],17); if(marks[id])marks[id].openPopup();
  hideRes(); cerrar(); document.getElementById('SI').value='';
}

function irACoord(lat,lng,nombre) {
  map.setView([parseFloat(lat),parseFloat(lng)],17);
  L.popup().setLatLng([parseFloat(lat),parseFloat(lng)]).setContent('<div class="ppop"><b>📍 '+nombre+'</b><div class="ppop-btns"><button class="ppop-btn pnav" onclick="navegar('+lat+','+lng+')">🧭 Cómo llegar</button></div></div>').openOn(map);
  hideRes(); document.getElementById('SI').value='';
}

function hideRes(){ document.getElementById('resultados').style.display='none'; }

function renderLista() {
  var filtrados=filtro==='todos'?lugares:lugares.filter(function(l){return l.cat===filtro;});
  var favs=filtrados.filter(function(l){return l.cat==='Favorito';});
  filtrados=favs.concat(filtrados.filter(function(l){return l.cat!=='Favorito';}));
  var chips=['todos|Todos','Casa|🏠 Casa','Trabajo|💼 Trabajo','Negocio|🏪 Negocio','Amigo|👤 Amigo','Favorito|⭐ Favorito','Otro|📍 Otro'];
  var chipsH='<div class="chips">'+chips.map(function(c){var p=c.split('|');var on=filtro===p[0]?' on':'';return '<span class="chip'+on+'" onclick="setFiltro(\''+p[0]+'\')">'+p[1]+'</span>';}).join('')+'</div>';
  var listaH='';
  if(!filtrados.length){listaH='<div class="empty"><div class="ei">📭</div><p>No hay lugares guardados.<br>Tocá el mapa o ➕ para agregar.</p></div>';}
  else{filtrados.forEach(function(l){var color=COLS[l.cat]||'#64748b';listaH+='<div class="litem" onclick="irA('+l.id+')"><div class="ldot" style="background:'+color+'"></div><div class="linfo"><div class="ln">'+l.nombre+'</div><div class="lc">'+l.cat+' · '+l.fecha+'</div></div><button class="lbtn lnav" onclick="event.stopPropagation();navegar('+l.lat+','+l.lng+')">🧭</button><button class="lbtn ldel" onclick="event.stopPropagation();eliminar('+l.id+')">🗑️</button></div>';});}
  document.getElementById('pTitulo').innerHTML='📌 Mis Lugares <span class="badge">'+lugares.length+'</span>';
  document.getElementById('pBody').innerHTML=chipsH+listaH;
}

function setFiltro(cat){ filtro=cat; renderLista(); }

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');});
  var el=document.getElementById('t-'+tab); if(el)el.classList.add('on');
  if(tab==='lugares'){renderLista();abrirPanel();}
  else if(tab==='mapa'){cerrar();}
}

function abrirPanel(){ document.getElementById('panel').classList.add('open'); document.getElementById('overlay').style.display='block'; }
function cerrar(){ document.getElementById('panel').classList.remove('open'); document.getElementById('overlay').style.display='none'; hideRes(); document.querySelectorAll('.tab').forEach(function(b){b.classList.remove('on');}); document.getElementById('t-mapa').classList.add('on'); }

function showInfo() {
  var lic=JSON.parse(localStorage.getItem('mm_licencia')||'{}');
  var d=document.createElement('div');
  d.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px';
  d.innerHTML='<div style="background:var(--card);color:var(--texto);border-radius:20px;padding:24px;max-width:340px;width:100%">'+
    '<div style="font-size:36px;text-align:center">🗺️</div>'+
    '<h2 style="text-align:center;margin:8px 0 4px">MendozaMapa</h2>'+
    '<p style="text-align:center;color:#64748b;font-size:12px;margin-bottom:16px">Provincia de Mendoza</p>'+
    '<div style="background:var(--bg);border-radius:12px;padding:12px;margin-bottom:16px;font-size:12px;color:var(--gris)">'+
    '👤 Licenciado a: <b style="color:var(--texto)">'+(lic.cliente||'-')+'</b><br>'+
    '🔑 Código: <span style="font-family:monospace;color:#2563a8">'+(lic.codigo||'-')+'</span>'+
    '</div>'+
    '<div style="font-size:13px;line-height:2;color:var(--texto)">📍 <b>Tocá el mapa</b> para guardar un lugar<br>➕ <b>Botón verde</b> guarda tu posición actual<br>🧭 <b>Cómo llegar</b> abre Google Maps con GPS<br>💾 Exportar backup · 📂 Importar backup</div>'+
    '<button onclick="this.parentElement.parentElement.remove()" style="width:100%;margin-top:16px;padding:13px;background:#2563a8;color:#fff;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer">Cerrar</button>'+
    '</div>';
  document.body.appendChild(d);
  d.onclick=function(e){if(e.target===d)d.remove();};
}

function exportar() {
  if(!lugares.length){toast('⚠️ No hay lugares para exportar');return;}
  var blob=new Blob([JSON.stringify({version:2,lugares:lugares},null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob), a=document.createElement('a'); a.href=url; a.download='MendozaMapa_backup.json'; a.click(); URL.revokeObjectURL(url); toast('💾 Backup exportado!');
}

function importar() {
  var inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=function(e){
    var file=e.target.files[0]; if(!file)return;
    var r=new FileReader();
    r.onload=function(ev){
      try{var data=JSON.parse(ev.target.result),imp=data.lugares||data;if(!Array.isArray(imp))throw new Error();var ex={};lugares.forEach(function(l){ex[l.id]=true;});var nuevos=0;imp.forEach(function(l){if(!ex[l.id]){lugares.push(l);nuevos++;}});save();Object.values(marks).forEach(function(m){m.remove();});marks={};cargarMarkers();actualizarBadge();toast('✅ '+nuevos+' lugares importados!');}
      catch(err){toast('❌ Archivo inválido');}
    }; r.readAsText(file);
  }; inp.click();
}

function save(){ localStorage.setItem('mm_v2',JSON.stringify(lugares)); }
function actualizarBadge(){ var b=document.getElementById('badge'); if(b)b.textContent=lugares.length; }
function toast(msg){ var el=document.getElementById('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(function(){el.classList.remove('show');},2500); }

// ARRANQUE
window.onload = function() {
  initMap();
};

document.addEventListener('click',function(e){
  var res=document.getElementById('resultados'), sb=document.getElementById('searchbar');
  if(res&&sb&&!res.contains(e.target)&&!sb.contains(e.target))hideRes();
});
